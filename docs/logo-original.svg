<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 185" width="320" height="185">

  <!-- background -->
  <rect width="320" height="185" fill="#ffffff"/>

  <!-- ── marca: cristal principal (4-pointed sparkle) ──
       centro (160, 57), raio externo 38, cintura 7
       path: M top C NE-pinch E C SE-pinch S C SW-pinch W C NW-pinch top Z -->
  <path d="M 160,19
           C 167,50 167,50 198,57
           C 167,64 167,64 160,95
           C 153,64 153,64 122,57
           C 153,50 153,50 160,19 Z"
        fill="#0a0a0a"/>

  <!-- acento esquerdo: cristal menor, centro (125,34), raio 6, cintura 1.2 -->
  <path d="M 125,28
           C 126.2,32.8 126.2,32.8 131,34
           C 126.2,35.2 126.2,35.2 125,40
           C 123.8,35.2 123.8,35.2 119,34
           C 123.8,32.8 123.8,32.8 125,28 Z"
        fill="#0a0a0a"/>

  <!-- acento direito: cristal mínimo, centro (194,31), raio 4, cintura 0.8 -->
  <path d="M 194,27
           C 194.8,30.2 194.8,30.2 198,31
           C 194.8,31.8 194.8,31.8 194,35
           C 193.2,31.8 193.2,31.8 190,31
           C 193.2,30.2 193.2,30.2 194,27 Z"
        fill="#0a0a0a" opacity="0.65"/>

  <!-- ── wordmark GIO ── -->
  <text x="160" y="136"
        font-family="Georgia, 'Palatino Linotype', Palatino, serif"
        font-size="42"
        font-weight="400"
        letter-spacing="14"
        text-anchor="middle"
        fill="#0a0a0a">GIO</text>

  <!-- ── subtítulo com linhas decorativas ── -->
  <line x1="63"  y1="152" x2="106" y2="152" stroke="#0a0a0a" stroke-width="0.6"/>

  <text x="160" y="160"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="5.5"
        text-anchor="middle"
        fill="#0a0a0a">HANDMADE</text>

  <line x1="214" y1="152" x2="257" y2="152" stroke="#0a0a0a" stroke-width="0.6"/>

</svg>
